<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#072036"/>
      <stop offset="1" stop-color="#02040c"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#7df9ff"/>
      <stop offset="1" stop-color="#00f3ff"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#bg)" stroke="#00f3ff" stroke-opacity="0.35" stroke-width="1"/>

  <!-- HUD corner ticks -->
  <g stroke="#00f3ff" stroke-opacity="0.55" stroke-width="1" stroke-linecap="round">
    <path d="M5 8 V5 H8"/>
    <path d="M27 8 V5 H24"/>
    <path d="M5 24 V27 H8"/>
    <path d="M27 24 V27 H24"/>
  </g>

  <g filter="url(#glow)">
    <!-- expanding LiDAR scan arcs -->
    <path d="M16 16 m-9 0 a9 9 0 0 1 9 -9" fill="none" stroke="#00ff88" stroke-opacity="0.85" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M16 16 m6 0 a6 6 0 0 1 -6 6" fill="none" stroke="#00f3ff" stroke-opacity="0.7" stroke-width="1.2" stroke-linecap="round"/>

    <!-- hexagon data node -->
    <polygon points="16,5.5 25,11 25,21 16,26.5 7,21 7,11"
             fill="none" stroke="#00f3ff" stroke-width="2" stroke-linejoin="round"/>

    <!-- glowing core -->
    <circle cx="16" cy="16" r="3.4" fill="url(#core)"/>
  </g>
</svg>
